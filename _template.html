<!DOCTYPE html>
<!-- =====================================================================
     MAKEVENT page template — copy this to start a new view.
     1. Rename to <page>.html
     2. Fill in <title>, the SEO/OG meta, and the canonical/og:url.
     3. Mark the active nav link (grad-text font-bold nav-glow) + point the
        others at their pages.
     4. Put the page content inside <main>.
     Shared tokens + classes live in styles.css. Layout via Tailwind (CDN).
     ===================================================================== -->
