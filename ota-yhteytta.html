<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ota yhteyttä — MAKEVENT</title>

    <meta name="description" content="Ota yhteyttä MAKEVENT-tiimiin. Jätä viesti, niin palaamme asiaan pian.">
    <meta name="theme-color" content="#25193C">
    <link rel="canonical" href="https://makevent.fi/ota-yhteytta">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="MAKEVENT">
    <meta property="og:title" content="Ota yhteyttä — MAKEVENT">
    <meta property="og:description" content="Ota yhteyttä MAKEVENT-tiimiin. Jätä viesti, niin palaamme asiaan pian.">
    <meta property="og:url" content="https://makevent.fi/ota-yhteytta">
    <meta property="og:image" content="https://makevent.fi/phones-group.png">
    <meta property="og:locale" content="fi_FI">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ota yhteyttä — MAKEVENT">
    <meta name="twitter:image" content="https://makevent.fi/phones-group.png">

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Encode+Sans+Semi+Expanded:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="text-white min-h-screen flex flex-col overflow-x-hidden antialiased bg-[#25193C]">

    <!-- Background shine + dark layer (see styles.css). -->
    <div class="bg-glow" aria-hidden="true"></div>
    <div class="bg-tint" aria-hidden="true"></div>

    <!-- ===================== HEADER / NAV ===================== -->
    <header class="w-full max-w-7xl mx-auto px-5 lg:px-10 pt-6 lg:pt-8 pb-2 relative z-50">

        <!-- ===== DESKTOP top row (lg+) ===== -->
        <div class="hidden lg:flex items-center justify-between gap-6">
            <div class="flex flex-col items-start gap-2">
                <a href="/" class="block select-none">
                    <img src="Logo.png" alt="MAKEVENT" class="h-7 w-auto object-contain">
                </a>
            </div>
            <a href="https://api.makevent.dev/app" class="cta-glow shrink-0 rounded-full border border-white/25 px-5 py-2.5 text-sm font-bold tracking-wide">
                LATAA SOVELLUS
            </a>
        </div>

        <!-- ===== DESKTOP centre nav (lg+) ===== -->
        <nav class="hidden lg:flex items-center gap-9 text-[15px] absolute left-1/2 -translate-x-1/2 top-9">
            <a href="/" class="grad-text nav-glow">Koti</a>
            <a href="/hinnasto" class="grad-text nav-glow">Hinnasto</a>
            <a href="/ota-yhteytta" class="grad-text font-bold nav-glow">Ota yhteyttä</a>
        </nav>

        <!-- ===== MOBILE top row (<lg): ☰ · centred logo · download ===== -->
        <div class="relative flex lg:hidden items-center justify-between">
            <button id="menuBtn" type="button" aria-label="Avaa valikko" class="text-white nav-glow p-1 -ml-1">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-width="2" d="M4 7h16M4 12h16M4 17h16"/></svg>
            </button>
            <a href="/" class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 select-none">
                <img src="Logo.png" alt="MAKEVENT" class="h-7 w-auto object-contain">
            </a>
            <a href="https://api.makevent.dev/app" aria-label="Lataa sovellus" class="block shrink-0">
                <img src="logoWithBackground.png" alt="Lataa MAKEVENT-sovellus" class="h-10 w-10 rounded-xl object-cover">
            </a>
        </div>

    </header>

    <!-- ===== MOBILE MENU (full-screen overlay, <lg) ===== -->
    <div id="mobileMenu" class="lg:hidden fixed inset-0 z-[70] hidden">
        <div class="menu-panel absolute inset-0 overflow-hidden bg-[#25193C]">
            <div class="bg-glow" aria-hidden="true"></div>
            <div class="bg-tint" aria-hidden="true"></div>
          <div class="relative z-10 h-full flex flex-col">
            <div class="flex items-center justify-between px-5 pt-6 shrink-0">
                <img src="Logo.png" alt="MAKEVENT" class="h-7 w-auto object-contain">
                <button id="menuClose" type="button" aria-label="Sulje valikko" class="text-white p-1 -mr-1">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <nav class="flex-1 flex flex-col items-center justify-center gap-8 text-3xl font-semibold py-8">
                <a href="/" class="grad-text">Koti</a>
                <a href="/hinnasto" class="grad-text">Hinnasto</a>
                <a href="/ota-yhteytta" class="grad-text font-bold nav-glow">Ota yhteyttä</a>
            </nav>
          </div>
        </div>
    </div>

    <!-- ===================== CONTENT ===================== -->
    <main class="relative z-10 w-full max-w-6xl mx-auto px-6 lg:px-10 flex-grow flex flex-col items-center pt-10 lg:pt-20 pb-24">
        <div class="w-full max-w-xl">
            <!-- Title: solid white (not grad-text) per design. -->
            <h1 class="text-white text-5xl sm:text-6xl font-extrabold tracking-tight">Ota yhteyttä</h1>

            <!-- Contact form. The first field accepts email OR phone (no strict
                 validation). Submit opens the user's mail client to info@makevent.fi. -->
            <form id="contactForm" class="mt-10 flex flex-col" novalidate>
                <label for="cf-contact" class="grad-text text-lg font-semibold">Sähköposti tai puhelin*</label>
                <input id="cf-contact" name="contact" type="text" required autocomplete="email"
                       class="mt-3 w-full rounded-xl border-[1.5px] border-[#BABABA] bg-[#181F2C73] px-4 py-3 text-white placeholder-gray-500 outline-none focus:border-white transition">

                <label for="cf-message" class="mt-7 grad-text text-lg font-semibold">Viesti*</label>
                <textarea id="cf-message" name="message" required rows="6"
                       class="mt-3 w-full rounded-xl border-[1.5px] border-[#BABABA] bg-[#181F2C73] px-4 py-3 text-white placeholder-gray-500 outline-none focus:border-white transition resize-y"></textarea>

                <!-- honeypot: invisible to people; bots that fill it are dropped server-side -->
                <input type="text" name="company" id="cf-company" tabindex="-1" autocomplete="off" aria-hidden="true" class="hidden">

                <button id="cf-submit" type="submit" class="mt-8 self-center rounded-full border-[1.5px] border-[#BABABA] card-btn px-12 py-3 text-sm font-extrabold tracking-wide text-center text-[#BABABA]">Lähetä</button>
                <p id="cf-status" class="mt-4 text-center text-sm" aria-live="polite"></p>
            </form>
        </div>
    </main>

    <!-- ===================== FOOTER ===================== -->
    <footer class="w-full pt-10 pb-10 px-10 mt-auto relative z-50">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-12 items-start">
            <div class="md:col-span-5">
                <div class="mb-4 select-none">
                    <img src="logo-footer.png" alt="MAKEVENT" class="h-8 lg:h-12 w-auto object-contain">
                </div>
            </div>
            <div class="md:col-span-3 space-y-2 text-sm text-gray-400">
                <p class="font-bold text-white text-base tracking-wide">MAKEVENT</p>
                <p><a href="mailto:info@makevent.fi" class="hover:text-white transition">info@makevent.fi</a></p>
                <p class="text-xs text-gray-600 pt-4">&copy; 2026 MAKEVENT</p>
            </div>
            <div class="md:col-span-2 space-y-3 text-sm text-gray-400">
                <p class="font-bold text-white text-xs uppercase tracking-wider">Socials</p>
                <ul class="space-y-2">
                    <li><a href="https://www.instagram.com/makevent.fi" target="_blank" rel="noopener noreferrer" class="hover:text-white transition">Instagram</a></li>
                </ul>
            </div>
            <div class="md:col-span-2 space-y-3 text-sm text-gray-400">
                <p class="font-bold text-white text-xs uppercase tracking-wider">Legal</p>
                <ul class="space-y-2">
                    <li><a href="/kayttoehdot" class="hover:text-white transition">Käyttöehdot</a></li>
                    <li><a href="/tietosuoja" class="hover:text-white transition">Tietosuojaseloste</a></li>
                    <li><a href="/evasteet" class="hover:text-white transition">Evästekäytäntö</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script>
        // Audience dropdowns (desktop + mobile) — open/close; options jump to Hinnasto.
        function wireDropdown(btnId, menuId) {
            var b = document.getElementById(btnId), m = document.getElementById(menuId);
            if (!b || !m) return;
            b.addEventListener('click', function (e) { e.stopPropagation(); m.classList.toggle('hidden'); });
        }
        wireDropdown('audienceBtn', 'audienceMenu');
        wireDropdown('audienceBtnM', 'audienceMenuM');
        document.addEventListener('click', function () {
            ['audienceMenu', 'audienceMenuM'].forEach(function (id) {
                var m = document.getElementById(id); if (m) m.classList.add('hidden');
            });
        });

        // Mobile menu (full-screen overlay)
        var mobileMenu = document.getElementById('mobileMenu');
        if (mobileMenu) {
            var openMenu = function () { mobileMenu.classList.remove('hidden'); requestAnimationFrame(function () { mobileMenu.classList.add('open'); }); };
            var closeMenu = function () { mobileMenu.classList.remove('open'); setTimeout(function () { mobileMenu.classList.add('hidden'); }, 250); };
            document.getElementById('menuBtn').addEventListener('click', openMenu);
            document.getElementById('menuClose').addEventListener('click', closeMenu);
            mobileMenu.querySelectorAll('a').forEach(function (a) { a.addEventListener('click', closeMenu); });
        }

        // Contact form → POST to the backend, which emails info@makevent.fi via Resend.
        var cfForm = document.getElementById('contactForm');
        var cfStatus = document.getElementById('cf-status');
        var cfBtn = document.getElementById('cf-submit');
        cfForm.addEventListener('submit', function (e) {
            e.preventDefault();
            var contact = document.getElementById('cf-contact').value.trim();
            var message = document.getElementById('cf-message').value.trim();
            var company = document.getElementById('cf-company').value; // honeypot
            if (!contact || !message) { return; } // light guard, no strict format check
            cfBtn.disabled = true;
            cfStatus.className = 'mt-4 text-center text-sm text-[#BABABA]';
            cfStatus.textContent = 'Lähetetään…';
            fetch('https://api.makevent.dev/public/contact', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contact: contact, message: message, company: company })
            }).then(function (r) {
                if (!r.ok) { throw new Error('status ' + r.status); }
                cfStatus.className = 'mt-4 text-center text-sm text-[#29A52F]';
                cfStatus.textContent = 'Kiitos! Viestisi on lähetetty.';
                cfForm.reset();
            }).catch(function () {
                cfStatus.className = 'mt-4 text-center text-sm text-red-400';
                cfStatus.textContent = 'Lähetys epäonnistui. Yritä myöhemmin uudelleen.';
            }).finally(function () {
                cfBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
